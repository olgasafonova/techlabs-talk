<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Bridge - How do we make AI act?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    body {
      width: 1920px;
      height: 1080px;
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #1A1A1A;
      color: #FFFFFF;
      overflow: hidden;
    }

    .slide {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 80px;
      padding-right: 400px;
    }

    h1 {
      font-size: 96px;
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    h1 .highlight {
      color: #E53935;
    }

    .slide-number {
      position: absolute;
      bottom: 80px;
      right: 80px;
      font-size: 14px;
      font-weight: 600;
      color: #AAA;
    }
  </style>
</head>
<body>
  <div class="slide">
    <h1>So how do we<br>make AI <span class="highlight">do things?</span></h1>
  </div>
</body>
</html>

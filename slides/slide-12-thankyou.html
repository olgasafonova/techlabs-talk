<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Slide - Thank You</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');

    body {
      width: 1920px;
      height: 1080px;
      font-family: 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #FAFAFA;
      color: #1A1A1A;
      overflow: hidden;
    }

    .slide {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 80px 1fr 80px;
      grid-template-rows: 80px auto auto 1fr 80px;
    }

    .section-label {
      grid-column: 2 / 3;
      grid-row: 2 / 3;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #E53935;
      padding-top: 40px;
      padding-bottom: 40px;
    }

    h1 {
      grid-column: 2 / 3;
      grid-row: 3 / 4;
      font-size: 80px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.03em;
      padding-bottom: 56px;
    }

    h1 .highlight { color: #E53935; }
    h1 .muted { color: #888; font-size: 48px; }

    .columns {
      grid-column: 2 / 3;
      grid-row: 4 / 5;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-content: start;
    }

    .col p {
      font-size: 28px;
      color: #444;
      line-height: 1.5;
      margin-bottom: 24px;
    }

    .seed-questions {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .seed-label {
      font-size: 24px;
      font-weight: 700;
      color: #888;
      margin-bottom: 8px;
    }

    .seed-q {
      font-size: 26px;
      color: #555;
      line-height: 1.4;
      padding-left: 28px;
      position: relative;
    }

    .seed-q::before {
      content: '→';
      position: absolute;
      left: 0;
      color: #E53935;
      font-weight: 700;
    }

    /* QR codes */
    .qr-section {
      display: flex;
      gap: 40px;
    }

    .qr-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .qr-code {
      width: 160px;
      height: 160px;
      background: #fff;
      padding: 12px;
      border-radius: 8px;
      border: 2px solid #E0E0E0;
    }

    .qr-code img {
      width: 100%;
      height: 100%;
    }

    .qr-label {
      font-size: 24px;
      font-weight: 600;
      color: #888;
    }

    .slide-number {
      position: absolute;
      bottom: 80px;
      right: 80px;
      font-size: 14px;
      font-weight: 600;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="section-label">Thank You</div>

    <h1>Olga Safonova<br><span class="muted">Questions?</span></h1>

    <div class="columns">
      <div class="col">
        <div class="seed-questions">
          <div class="seed-label">If you're stuck, ask me about:</div>
          <div class="seed-q">What AI tools are you using in your TechLabs project?</div>
          <div class="seed-q">What's been frustrating about AI in your coursework?</div>
          <div class="seed-q">How do I pick which AI tool to learn first?</div>
        </div>
      </div>
      <div class="col">
        <div class="qr-section">
          <div class="qr-item">
            <div class="qr-code"><img src="icons/qr-linkedin.svg" alt="LinkedIn QR"></div>
            <div class="qr-label">LinkedIn</div>
          </div>
          <div class="qr-item">
            <div class="qr-code"><img src="icons/qr-github.svg" alt="GitHub QR"></div>
            <div class="qr-label">GitHub</div>
          </div>
          <div class="qr-item">
            <div class="qr-code"><img src="icons/qr-substack.svg" alt="Substack QR"></div>
            <div class="qr-label">Substack</div>
          </div>
        </div>
      </div>
    </div>

    <div class="slide-number">14</div>
  </div>
</body>
</html>
